<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Beam Pointer</title>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #58a6ff;
      --red:     #f85149;
      --green:   #3fb950;
      --yellow:  #d29922;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }

    .screen { display: none; height: 100%; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── Join screen ── */
    #screen-join { justify-content: center; align-items: center; padding: 24px; }

    .join-card {
      width: 100%; max-width: 380px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 32px 24px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .join-header { text-align: center; }
    .join-header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .join-header p  { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; color: var(--muted); font-weight: 500; }
    .field input {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: 16px; padding: 10px 12px; outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }

    .btn-primary {
      background: var(--accent); color: #0d1117;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; padding: 13px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:active { opacity: 0.8; }

    .join-error { color: var(--red); font-size: 13px; text-align: center; min-height: 18px; }
    .join-footer { text-align: center; color: var(--muted); font-size: 12px; }

    /* ── Compass screen ── */
    #screen-compass { justify-content: space-between; }

    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 10px;
      font-size: 12px; color: var(--muted);
    }
    .pill span { color: var(--text); font-weight: 600; }

    .gps-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--yellow); flex-shrink: 0; transition: background 0.3s;
    }
    .gps-dot.fixed  { background: var(--green); }
    .gps-dot.no-fix { background: var(--red); }

    .acc-good { border-color: var(--green); color: var(--green); }
    .acc-ok   { border-color: var(--yellow); color: var(--yellow); }
    .acc-poor { border-color: var(--red); color: var(--red); }

    .peer-count {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    .peer-count-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red); transition: background 0.3s;
    }
    .peer-count-dot.active { background: var(--green); }

    /* Compass accuracy warning */
    #compass-warn {
      display: none;
      background: #2d1f00; border-bottom: 1px solid var(--yellow);
      color: var(--yellow); font-size: 12px; padding: 6px 16px; text-align: center;
    }
    #compass-warn.visible { display: block; }

    /* ── Peers/cities list ── */
    .peers-list {
      flex: 1; overflow-y: auto;
      padding: 10px; display: flex; flex-direction: column; gap: 10px;
      min-height: 0;
    }
    .waiting-peers {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 14px; font-style: italic;
    }

    /* ── Peer card ── */
    .peer-card {
      display: flex; gap: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px; align-items: center;
    }
    .city-card { border-color: #1c2a3a; }

    .card-compass-wrap { width: 120px; height: 120px; flex-shrink: 0; }
    .card-compass-wrap svg { width: 100%; height: 100%; }

    .card-data { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }

    .card-name {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 600;
    }
    .card-name-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .card-dot.city { background: var(--accent); }

    .btn-remove-city {
      background: transparent; border: none;
      color: var(--muted); font-size: 16px; cursor: pointer;
      padding: 0 2px; line-height: 1; flex-shrink: 0;
      transition: color 0.15s;
    }
    .btn-remove-city:active { color: var(--red); }

    .card-bearing-big {
      font-size: 38px; font-weight: 700; letter-spacing: -1.5px; line-height: 1;
    }
    .card-bearing-big sub {
      font-size: 13px; font-weight: 400; color: var(--muted);
      letter-spacing: 0; vertical-align: baseline; margin-left: 2px;
    }
    .card-waiting-text { font-size: 13px; color: var(--muted); font-style: italic; }
    .card-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .card-stat { display: flex; flex-direction: column; }
    .card-stat .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .card-stat .val { font-size: 14px; font-weight: 600; }

    /* ── Bottom bar ── */
    .bottom-bar { padding: 12px 20px 20px; display: flex; gap: 8px; }
    .btn-leave {
      flex: 1; background: transparent;
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-size: 13px; padding: 10px;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .btn-leave:active { border-color: var(--red); color: var(--red); }
    .btn-share {
      background: transparent; border: 1px solid var(--border); border-radius: 8px;
      color: var(--accent); font-size: 13px; padding: 10px 12px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .btn-share:active { border-color: var(--accent); background: #1c2a3a; }
    .btn-city {
      background: transparent; border: 1px solid var(--border); border-radius: 8px;
      color: var(--green); font-size: 13px; padding: 10px 12px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .btn-city:active { border-color: var(--green); background: #0d1f0d; }

    /* Toast */
    #share-toast {
      position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 16px; font-size: 13px; color: var(--text);
      opacity: 0; pointer-events: none; transition: opacity 0.2s; white-space: nowrap;
    }
    #share-toast.show { opacity: 1; }

    /* ── City picker overlay ── */
    #city-overlay {
      display: none; position: absolute; inset: 0;
      background: var(--bg); z-index: 20;
      flex-direction: column;
    }
    #city-overlay.visible { display: flex; }

    .city-overlay-header {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 16px 12px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .city-overlay-title { font-size: 17px; font-weight: 700; flex: 1; }
    .btn-city-close {
      background: transparent; border: none;
      color: var(--muted); font-size: 22px; cursor: pointer; padding: 4px; line-height: 1;
    }
    .btn-city-close:active { color: var(--text); }

    .city-search-wrap { padding: 10px 16px; flex-shrink: 0; }
    .city-search {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 15px;
      padding: 10px 12px; outline: none; transition: border-color 0.15s;
    }
    .city-search:focus { border-color: var(--accent); }

    .city-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .city-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px; cursor: pointer; border-bottom: 1px solid #0d1117;
      transition: background 0.1s;
    }
    .city-item:active { background: var(--surface); }
    .city-item-name { font-size: 15px; }
    .city-item-region { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .city-item-check {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .city-item.selected .city-item-check {
      background: var(--accent); border-color: var(--accent); color: #0d1117;
      font-size: 11px; font-weight: 700;
    }
    .city-no-results {
      text-align: center; padding: 40px 16px;
      color: var(--muted); font-size: 14px; font-style: italic;
    }

    /* ── Tilt overlay ── */
    #tilt-overlay {
      display: none; position: absolute; inset: 0;
      background: var(--bg); z-index: 10;
      flex-direction: column; justify-content: center; align-items: center;
      gap: 28px; padding: 32px; text-align: center;
    }
    #tilt-overlay.visible { display: flex; }
    .tilt-icon { width: 80px; height: 80px; animation: tilt-wobble 1.4s ease-in-out infinite; }
    @keyframes tilt-wobble {
      0%, 100% { transform: rotate(0deg); }
      25%       { transform: rotate(-18deg); }
      75%       { transform: rotate(18deg); }
    }
    .tilt-title { font-size: 22px; font-weight: 700; }
    .tilt-sub   { font-size: 14px; color: var(--muted); max-width: 260px; }
    .tilt-bar-wrap { width: 100%; max-width: 280px; }
    .tilt-bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .tilt-bar-track { width: 100%; height: 8px; background: var(--surface); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); }
    .tilt-bar-fill { height: 100%; width: 0%; border-radius: 4px; background: var(--red); transition: width 0.2s, background 0.2s; }
    .tilt-bar-fill.near-flat { background: var(--yellow); }
    .tilt-bar-fill.flat      { background: var(--green); }
  </style>
</head>
<body>

<!-- ── Join Screen ── -->
<div id="screen-join" class="screen active">
  <div class="join-card">
    <div class="join-header">
      <h1>Beam Pointer</h1>
      <p>Live GPS Antenna Alignment</p>
    </div>
    <div class="field">
      <label for="input-name">Your callsign / name</label>
      <input id="input-name" type="text" placeholder="e.g. VA3ZK" autocomplete="off" />
    </div>
    <div class="field">
      <label for="input-room">Room code</label>
      <input id="input-room" type="text" placeholder="e.g. VA3ZK-VE3AB" autocomplete="off" />
    </div>
    <button id="btn-join" class="btn-primary">Join</button>
    <div id="join-error" class="join-error"></div>
    <div class="join-footer">v2.2 &middot; Zion Koudijs &middot; Beta</div>
  </div>
</div>

<!-- ── Compass Screen ── -->
<div id="screen-compass" class="screen" style="position:relative">
  <div class="status-bar">
    <div class="gps-dot" id="gps-dot"></div>
    <div class="pill" id="pill-acc">±--m</div>
    <div class="pill">Room: <span id="status-room"></span></div>
    <div class="pill"><span id="status-name"></span></div>
    <div class="peer-count">
      <div class="peer-count-dot" id="peer-count-dot"></div>
      <span id="peer-count-label">No peers</span>
    </div>
  </div>

  <div id="compass-warn">⚠ Poor compass accuracy — move away from metal objects</div>

  <div class="peers-list" id="peers-list">
    <div class="waiting-peers" id="waiting-peers">Waiting for peers or add a city below…</div>
  </div>

  <div class="bottom-bar">
    <button class="btn-share" id="btn-share">⬆ Share</button>
    <button class="btn-city"  id="btn-city">＋ City</button>
    <button class="btn-leave" id="btn-leave">Leave Room</button>
  </div>

  <div id="share-toast">Copied!</div>

  <!-- City picker overlay -->
  <div id="city-overlay">
    <div class="city-overlay-header">
      <span class="city-overlay-title">Add City Target</span>
      <button class="btn-city-close" id="btn-city-close">✕</button>
    </div>
    <div class="city-search-wrap">
      <input class="city-search" id="city-search" type="search" placeholder="Search cities…" autocomplete="off" />
    </div>
    <div class="city-list" id="city-list"></div>
  </div>

  <!-- Tilt overlay -->
  <div id="tilt-overlay">
    <svg class="tilt-icon" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <rect x="20" y="8" width="40" height="64" rx="6" fill="none" stroke="#8b949e" stroke-width="3"/>
      <circle cx="40" cy="62" r="4" fill="#8b949e"/>
      <line x1="33" y1="16" x2="47" y2="16" stroke="#8b949e" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <div class="tilt-title">Lay your phone flat</div>
    <div class="tilt-sub">Place the phone face-up on a flat surface next to your antenna.</div>
    <div class="tilt-bar-wrap">
      <div class="tilt-bar-label"><span>Tilt</span><span id="tilt-degrees">--°</span></div>
      <div class="tilt-bar-track"><div class="tilt-bar-fill" id="tilt-bar-fill"></div></div>
    </div>
  </div>
</div>

<script>
  // ─────────────────────────────────────────────────
  // Config
  // ─────────────────────────────────────────────────

  const WS_URL = location.protocol === 'https:'
    ? `wss://${location.host}/ws`
    : `ws://${location.hostname}:3005`;

  const DECLINATION = -10;

  // ─────────────────────────────────────────────────
  // City data
  // ─────────────────────────────────────────────────

  const CITIES = [

    { name: 'Manila',         region: 'Philippines',  lat:  14.5995, lng:  120.9842 },
    { name: 'Kuala Lumpur',   region: 'Malaysia',     lat:   3.1390, lng:  101.6869 },
    // Oceania
    { name: 'Sydney',         region: 'Australia',    lat: -33.8688, lng:  151.2093 },
    { name: 'Melbourne',      region: 'Australia',    lat: -37.8136, lng:  144.9631 },
    { name: 'Auckland',       region: 'New Zealand',  lat: -36.8509, lng:  174.7645 },
  ].sort((a, b) => a.name.localeCompare(b.name));

  // ─────────────────────────────────────────────────
  // State
  // ─────────────────────────────────────────────────

  let myName = '', roomCode = '', myId = null;
  let myLat = null, myLng = null, myAlt = null;
  let gpsFixed = false, gpsAccuracy = null;
  let ws = null, watchId = null;
  let inRoom = false, reconnectTimer = null, reconnectDelay = 2000;
  let wakeLock = null;

  const peers     = new Map(); // id   → { name, lat, lng, alt }
  const cities    = new Map(); // idx  → { name, lat, lng }
  const needleEls = new Map(); // key  → SVG needle <g>

  let compassHeading = 0;
  let isTilted = false;
  const TILT_MAX = 15, TILT_HYST = 12;

  // ─────────────────────────────────────────────────
  // Math
  // ─────────────────────────────────────────────────

  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;

  function haversineKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function forwardAzimuth(lat1, lng1, lat2, lng2) {
    const φ1=toRad(lat1), φ2=toRad(lat2), Δλ=toRad(lng2-lng1);
    const y = Math.sin(Δλ)*Math.cos(φ2);
    const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
    return (toDeg(Math.atan2(y, x)) + 360) % 360;
  }

  function cardinalLabel(b) {
    return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(b/22.5)%16];
  }

  function maidenhead(lat, lng) {
    const lon=lng+180, lt=lat+90;
    return String.fromCharCode(65+Math.floor(lon/20)) + String.fromCharCode(65+Math.floor(lt/10))
         + Math.floor((lon%20)/2) + Math.floor(lt%10);
  }

  function elevationAngleDeg(myA, peerA, distKm) {
    if (myA===null||peerA===null||distKm<0.001) return null;
    return toDeg(Math.atan2(peerA-myA, distKm*1000));
  }

  // ─────────────────────────────────────────────────
  // SVG compass builder (shared by peer and city cards)
  // ─────────────────────────────────────────────────

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function createCompassSVG(key) {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '-65 -65 130 130');

    const el = (tag, attrs) => {
      const e = document.createElementNS(ns, tag);
      for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    };
    const txt = (t,x,y,fill,size,w='400') => {
      const e = el('text',{x,y,'text-anchor':'middle','dominant-baseline':'middle',fill,'font-size':size,'font-weight':w,'font-family':'system-ui'});
      e.textContent = t; return e;
    };

    svg.appendChild(el('circle',{r:'63',fill:'#0d1117',stroke:'#30363d','stroke-width':'1.5'}));

    for (let deg=0; deg<360; deg+=5) {
      const major=deg%45===0, med=deg%15===0, r=toRad(deg-90);
      const outer=61, inner=major?53:med?56:58;
      svg.appendChild(el('line',{
        x1:(Math.cos(r)*outer).toFixed(2), y1:(Math.sin(r)*outer).toFixed(2),
        x2:(Math.cos(r)*inner).toFixed(2), y2:(Math.sin(r)*inner).toFixed(2),
        stroke:major?'#58a6ff':med?'#484f58':'#30363d', 'stroke-width':major?'2':'1',
      }));
    }

    svg.appendChild(txt('N', 0,-48,'#f85149',13,'700'));
    svg.appendChild(txt('E',48,  0,'#8b949e',11));
    svg.appendChild(txt('S', 0, 51,'#8b949e',11));
    svg.appendChild(txt('W',-48, 0,'#8b949e',11));

    const needle = el('g',{transform:'rotate(0)'});
    needle.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
    needle.appendChild(el('polygon',{points:'0,-44 -4,4 0,-2 4,4',fill:'#f85149'}));
    needle.appendChild(el('polygon',{points:'0, 44 -4,4 0,-2 4,4',fill:'#484f58'}));
    needle.appendChild(el('circle', {r:'4',fill:'#e6edf3',stroke:'#0d1117','stroke-width':'1.5'}));
    svg.appendChild(needle);
    svg.appendChild(el('circle',{r:'8',fill:'none',stroke:'#30363d','stroke-width':'1'}));

    needleEls.set(key, needle);
    return svg;
  }

  // ─────────────────────────────────────────────────
  // Generic card rendering (shared by peers and cities)
  // ─────────────────────────────────────────────────

  function buildCard(key, name, dotClass, extraNameHtml) {
    const card = document.createElement('div');
    card.className = 'peer-card';
    card.id = `card-${key}`;

    const compassWrap = document.createElement('div');
    compassWrap.className = 'card-compass-wrap';
    compassWrap.appendChild(createCompassSVG(key));

    const data = document.createElement('div');
    data.className = 'card-data';
    data.innerHTML = `
      <div class="card-name">
        <span class="card-name-text">${escapeHtml(name)}</span>
        <span class="card-dot ${dotClass}"></span>
        ${extraNameHtml}
      </div>
      <div id="cwait-${key}" class="card-waiting-text">Waiting for GPS…</div>
      <div id="cdata-${key}" style="display:none">
        <div class="card-bearing-big" id="ctrue-${key}">---<sub>° True</sub></div>
        <div class="card-row" style="margin-top:4px">
          <div class="card-stat"><span class="lbl">Mag</span><span class="val" id="cmag-${key}">---°</span></div>
          <div class="card-stat"><span class="lbl">Dist</span><span class="val" id="cdist-${key}">---</span></div>
          <div class="card-stat"><span class="lbl">Dir</span><span class="val" id="cdir-${key}">---</span></div>
        </div>
        <div class="card-row" style="margin-top:2px">
          <div class="card-stat"><span class="lbl">Grid</span><span class="val" id="cgrid-${key}" style="letter-spacing:1px">---</span></div>
          <div class="card-stat" id="celev-wrap-${key}" style="display:none">
            <span class="lbl">Elev</span><span class="val" id="celev-${key}">---</span>
          </div>
        </div>
      </div>
    `;

    card.appendChild(compassWrap);
    card.appendChild(data);
    return card;
  }

  function renderCardBearing(key, targetLat, targetLng, targetAlt) {
    const needle = needleEls.get(key);
    if (myLat === null) {
      if (needle) needle.setAttribute('transform', `rotate(${((360-compassHeading)%360).toFixed(1)})`);
      return;
    }

    const trueBearing = forwardAzimuth(myLat, myLng, targetLat, targetLng);
    const magBearing  = ((trueBearing + DECLINATION) + 360) % 360;
    const distKm      = haversineKm(myLat, myLng, targetLat, targetLng);
    const elev        = elevationAngleDeg(myAlt, targetAlt, distKm);

    if (needle) needle.setAttribute('transform', `rotate(${((trueBearing-compassHeading+360)%360).toFixed(1)})`);

    const s = (id,v) => { const e=document.getElementById(id); if(e) e.textContent=v; };
    document.getElementById(`ctrue-${key}`).innerHTML = `${Math.round(trueBearing)}<sub>° True</sub>`;
    s(`cmag-${key}`,  `${Math.round(magBearing)}°`);
    s(`cdist-${key}`, distKm>=100?`${distKm.toFixed(0)} km`:`${distKm.toFixed(1)} km`);
    s(`cdir-${key}`,  cardinalLabel(trueBearing));
    s(`cgrid-${key}`, maidenhead(targetLat, targetLng));

    const ew = document.getElementById(`celev-wrap-${key}`);
    if (ew) {
      if (elev !== null) { ew.style.display=''; s(`celev-${key}`, `${elev>=0?'+':''}${elev.toFixed(1)}°`); }
      else ew.style.display = 'none';
    }

    document.getElementById(`cwait-${key}`).style.display = 'none';
    document.getElementById(`cdata-${key}`).style.display = '';
  }

  function updateEmptyState() {
    const empty = peers.size === 0 && cities.size === 0;
    document.getElementById('waiting-peers').style.display = empty ? '' : 'none';
  }

  // ─────────────────────────────────────────────────
  // Peer cards
  // ─────────────────────────────────────────────────

  function clearAllPeerCards() {
    for (const id of [...peers.keys()]) removePeerCard(id);
    peers.clear();
    updateEmptyState();
    updatePeerStatus();
  }

  function addPeerCard(id, name) {
    if (peers.has(id)) return;
    peers.set(id, { name, lat: null, lng: null, alt: null });
    const card = buildCard(`p${id}`, name, '', '');
    document.getElementById('peers-list').appendChild(card);
    updateEmptyState();
    updatePeerStatus();
  }

  function removePeerCard(id) {
    const card = document.getElementById(`card-p${id}`);
    if (card) card.remove();
    peers.delete(id);
    needleEls.delete(`p${id}`);
    updateEmptyState();
    updatePeerStatus();
  }

  function updatePeerCard(id) {
    const peer = peers.get(id);
    if (!peer) return;
    if (peer.lat === null) {
      const n = needleEls.get(`p${id}`);
      if (n) n.setAttribute('transform', `rotate(${((360-compassHeading)%360).toFixed(1)})`);
      return;
    }
    renderCardBearing(`p${id}`, peer.lat, peer.lng, peer.alt);
  }

  function updateAllPeerCards() {
    for (const id of peers.keys()) updatePeerCard(id);
    for (const idx of cities.keys()) updateCityCard(idx);
  }

  function updatePeerStatus() {
    const n = peers.size;
    document.getElementById('peer-count-dot').className = 'peer-count-dot' + (n>0?' active':'');
    document.getElementById('peer-count-label').textContent = n===0?'No peers':`${n} peer${n===1?'':'s'}`;
  }

  // ─────────────────────────────────────────────────
  // City cards
  // ─────────────────────────────────────────────────

  function addCityCard(idx) {
    if (cities.has(idx)) return;
    const c = CITIES[idx];
    cities.set(idx, c);
    const key = `c${idx}`;
    const removeBtn = `<button class="btn-remove-city" data-idx="${idx}" title="Remove">✕</button>`;
    const card = buildCard(key, c.name, 'city', removeBtn);
    card.classList.add('city-card');
    document.getElementById('peers-list').appendChild(card);
    // Wire remove button
    card.querySelector('.btn-remove-city').addEventListener('click', e => {
      e.stopPropagation();
      removeCityCard(Number(e.currentTarget.dataset.idx));
      saveCities();
      renderCityList(document.getElementById('city-search').value);
    });
    updateEmptyState();
    // Render bearing immediately if GPS is available
    if (myLat !== null) renderCardBearing(key, c.lat, c.lng, null);
  }

  function removeCityCard(idx) {
    const key = `c${idx}`;
    const card = document.getElementById(`card-${key}`);
    if (card) card.remove();
    cities.delete(idx);
    needleEls.delete(key);
    updateEmptyState();
  }

  function updateCityCard(idx) {
    const c = cities.get(idx);
    if (!c || myLat === null) return;
    renderCardBearing(`c${idx}`, c.lat, c.lng, null);
  }

  function saveCities() {
    localStorage.setItem('bp-cities', JSON.stringify([...cities.keys()]));
  }

  function loadCities() {
    try {
      const saved = JSON.parse(localStorage.getItem('bp-cities') || '[]');
      for (const idx of saved) {
        if (idx >= 0 && idx < CITIES.length) addCityCard(idx);
      }
    } catch {}
  }

  // ─────────────────────────────────────────────────
  // City picker
  // ─────────────────────────────────────────────────

  function openCityPicker() {
    document.getElementById('city-search').value = '';
    renderCityList('');
    document.getElementById('city-overlay').classList.add('visible');
    document.getElementById('city-search').focus();
  }

  function closeCityPicker() {
    document.getElementById('city-overlay').classList.remove('visible');
  }

  function renderCityList(query) {
    const q = query.toLowerCase().trim();
    const list = document.getElementById('city-list');
    list.innerHTML = '';

    const filtered = CITIES.reduce((acc, city, idx) => {
      if (!q || city.name.toLowerCase().includes(q) || city.region.toLowerCase().includes(q)) {
        acc.push({ city, idx });
      }
      return acc;
    }, []);

    if (filtered.length === 0) {
      list.innerHTML = '<div class="city-no-results">No cities found</div>';
      return;
    }

    for (const { city, idx } of filtered) {
      const selected = cities.has(idx);
      const item = document.createElement('div');
      item.className = 'city-item' + (selected ? ' selected' : '');
      item.innerHTML = `
        <div>
          <div class="city-item-name">${escapeHtml(city.name)}</div>
          <div class="city-item-region">${escapeHtml(city.region)}</div>
        </div>
        <div class="city-item-check">${selected ? '✓' : ''}</div>
      `;
      item.addEventListener('click', () => {
        if (cities.has(idx)) {
          removeCityCard(idx);
        } else {
          addCityCard(idx);
        }
        saveCities();
        renderCityList(document.getElementById('city-search').value);
      });
      list.appendChild(item);
    }
  }

  // ─────────────────────────────────────────────────
  // GPS dot / accuracy pill
  // ─────────────────────────────────────────────────

  function updateGpsDot() {
    document.getElementById('gps-dot').className = 'gps-dot' + (gpsFixed ? ' fixed' : '');
    const pill = document.getElementById('pill-acc');
    if (gpsAccuracy === null) { pill.textContent = '±--m'; pill.className = 'pill'; return; }
    const m = Math.round(gpsAccuracy);
    pill.textContent = `±${m}m`;
    pill.className = 'pill ' + (m<=10?'acc-good':m<=30?'acc-ok':'acc-poor');
  }

  // ─────────────────────────────────────────────────
  // Wake Lock
  // ─────────────────────────────────────────────────

  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
    document.addEventListener('visibilitychange', onVisibilityChange);
  }
  async function onVisibilityChange() {
    if (document.visibilityState==='visible' && inRoom && !wakeLock) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
    }
  }
  function releaseWakeLock() {
    if (wakeLock) { wakeLock.release(); wakeLock = null; }
    document.removeEventListener('visibilitychange', onVisibilityChange);
  }

  // ─────────────────────────────────────────────────
  // GPS
  // ─────────────────────────────────────────────────

  function startGps() {
    if (!('geolocation' in navigator)) return;
    watchId = navigator.geolocation.watchPosition(
      pos => {
        myLat=pos.coords.latitude; myLng=pos.coords.longitude;
        myAlt=pos.coords.altitude; gpsAccuracy=pos.coords.accuracy;
        gpsFixed=true; updateGpsDot(); sendLocation(); updateAllPeerCards();
      },
      () => { gpsFixed=false; gpsAccuracy=null; updateGpsDot(); },
      { enableHighAccuracy:true, timeout:15000, maximumAge:5000 }
    );
  }
  function stopGps() {
    if (watchId!==null) { navigator.geolocation.clearWatch(watchId); watchId=null; }
    myLat=myLng=myAlt=null; gpsFixed=false; gpsAccuracy=null;
  }

  // ─────────────────────────────────────────────────
  // Motion sensors
  // ─────────────────────────────────────────────────

  function handleOrientation(e) {
    if (e.webkitCompassHeading != null) {
      compassHeading = e.webkitCompassHeading;
      const acc = e.webkitCompassAccuracy;
      if (acc != null && acc > 0)
        document.getElementById('compass-warn').classList.toggle('visible', acc > 20);
    } else if (e.alpha != null) {
      compassHeading = (360 - e.alpha) % 360;
    }

    const beta=e.beta??0, gamma=e.gamma??0;
    updateTiltOverlay(Math.sqrt(beta*beta+gamma*gamma));
    if (!isTilted) updateAllPeerCards();
  }

  function updateTiltOverlay(tilt) {
    const wasFlat = !isTilted;
    if (!isTilted && tilt>TILT_MAX) isTilted=true;
    if ( isTilted && tilt<TILT_HYST) isTilted=false;
    document.getElementById('tilt-overlay').classList.toggle('visible', isTilted);
    if (!isTilted && !wasFlat) updateAllPeerCards();
    const pct = Math.min(tilt/TILT_MAX*100, 100);
    const fill = document.getElementById('tilt-bar-fill');
    fill.style.width=`${pct.toFixed(1)}%`;
    fill.className='tilt-bar-fill'+(tilt<TILT_HYST?' flat':tilt<TILT_MAX?' near-flat':'');
    document.getElementById('tilt-degrees').textContent=`${tilt.toFixed(0)}°`;
  }

  function startOrientation() {
    if (typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function') {
      DeviceOrientationEvent.requestPermission()
        .then(s => { if(s==='granted') window.addEventListener('deviceorientation',handleOrientation,true); })
        .catch(console.warn);
    } else {
      window.addEventListener('deviceorientationabsolute',handleOrientation,true);
      window.addEventListener('deviceorientation',handleOrientation,true);
    }
  }
  function stopOrientation() {
    window.removeEventListener('deviceorientation',handleOrientation,true);
    window.removeEventListener('deviceorientationabsolute',handleOrientation,true);
    compassHeading=0; isTilted=false;
    document.getElementById('tilt-overlay').classList.remove('visible');
    document.getElementById('compass-warn').classList.remove('visible');
  }

  // ─────────────────────────────────────────────────
  // Share
  // ─────────────────────────────────────────────────

  let toastTimer = null;
  function shareRoom() {
    const url = `${location.origin}${location.pathname}?room=${encodeURIComponent(roomCode)}`;
    if (navigator.share) {
      navigator.share({title:'Beam Pointer',text:`Join room: ${roomCode}`,url}).catch(()=>{});
    } else {
      navigator.clipboard.writeText(url).then(()=>showToast('Copied!')).catch(()=>{
        const ta=document.createElement('textarea');
        ta.value=url; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        showToast('Copied!');
      });
    }
  }
  function showToast(msg) {
    const t=document.getElementById('share-toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
  }

  // ─────────────────────────────────────────────────
  // WebSocket
  // ─────────────────────────────────────────────────

  function sendLocation() {
    if (!ws||ws.readyState!==WebSocket.OPEN||myLat===null) return;
    ws.send(JSON.stringify({type:'location',lat:myLat,lng:myLng,alt:myAlt,name:myName}));
  }

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onopen = () => {
      reconnectDelay=2000;
      ws.send(JSON.stringify({type:'join',room:roomCode,name:myName}));
    };
    ws.onmessage = ({data}) => {
      let msg; try{msg=JSON.parse(data);}catch{return;}

      if (msg.type==='joined') {
        myId=msg.yourId;
        for (const p of (msg.peers||[])) addPeerCard(p.id, p.name);
        sendLocation();
      }
      if (msg.type==='peer_joined') { addPeerCard(msg.id,msg.name); sendLocation(); }
      if (msg.type==='location') {
        const peer=peers.get(msg.id);
        if (peer) { peer.lat=msg.lat; peer.lng=msg.lng; peer.alt=msg.alt??null; updatePeerCard(msg.id); }
      }
      if (msg.type==='peer_disconnected') removePeerCard(msg.id);
      if (msg.type==='error') { leaveRoom(); document.getElementById('join-error').textContent=msg.message||'Connection error.'; }
    };
    ws.onclose = () => {
      if (!inRoom) return;
      clearAllPeerCards();
      reconnectTimer=setTimeout(()=>{ reconnectDelay=Math.min(reconnectDelay*2,30000); connect(); },reconnectDelay);
    };
    ws.onerror = ()=>{};
  }

  function disconnect() {
    clearTimeout(reconnectTimer);
    if (ws) { ws.onclose=null; ws.close(); ws=null; }
  }

  // ─────────────────────────────────────────────────
  // Join / Leave
  // ─────────────────────────────────────────────────

  function joinRoom() {
    const nameVal=document.getElementById('input-name').value.trim();
    const roomVal=document.getElementById('input-room').value.trim();
    if (!nameVal){document.getElementById('join-error').textContent='Enter your callsign or name.';return;}
    if (!roomVal){document.getElementById('join-error').textContent='Enter a room code.';return;}
    document.getElementById('join-error').textContent='';
    myName=nameVal; roomCode=roomVal; inRoom=true;
    localStorage.setItem('bp-name',myName); localStorage.setItem('bp-room',roomCode);
    document.getElementById('status-room').textContent=roomCode;
    document.getElementById('status-name').textContent=myName;
    showScreen('screen-compass');
    updateGpsDot(); updatePeerStatus(); updateEmptyState();
    requestWakeLock(); startGps(); startOrientation(); connect();
    loadCities();
  }

  function leaveRoom() {
    inRoom=false;
    disconnect(); stopGps(); stopOrientation(); releaseWakeLock();
    clearAllPeerCards();
    for (const idx of [...cities.keys()]) removeCityCard(idx);
    cities.clear();
    updateEmptyState();
    showScreen('screen-join');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ─────────────────────────────────────────────────
  // Startup
  // ─────────────────────────────────────────────────

  (function init() {
    const urlRoom=new URLSearchParams(location.search).get('room');
    document.getElementById('input-name').value=localStorage.getItem('bp-name')||'';
    document.getElementById('input-room').value=urlRoom||localStorage.getItem('bp-room')||'';
  })();

  document.getElementById('btn-join').addEventListener('click', joinRoom);
  document.getElementById('btn-leave').addEventListener('click', leaveRoom);
  document.getElementById('btn-share').addEventListener('click', shareRoom);
  document.getElementById('btn-city').addEventListener('click', openCityPicker);
  document.getElementById('btn-city-close').addEventListener('click', closeCityPicker);
  document.getElementById('city-search').addEventListener('input', e => renderCityList(e.target.value));
  ['input-name','input-room'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') joinRoom(); });
  });
</script>
</body>
</html>
